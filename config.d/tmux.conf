# set prefix key
set -g prefix C-a
unbind C-b

# send prefix by pressing twice
bind C-a send-prefix

# make esc more responsive
set -s escape-time 1

# make windows/panes 1 based
set -g base-index 1
setw -g pane-base-index 1

# reload conf
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# allow vi mode
setw -g mode-keys vi
set -g status-keys vi

# vi style copy mode
unbind p
bind p paste-buffer

# Updated for tmux >= v2.4
#bind -t vi-copy 'v' begin-selection
#bind -t vi-copy 'y' copy-selection
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection

## clipboard
## bind C-p run "tmux set-buffer \"$(pbpaste)\"; tmux paste-buffer"
#bind C-p run "tmux set-buffer \"$(reattach-to-user-namespace pbpaste)\"; tmux paste-buffer"
#bind C-y run "tmux show-buffer | pbcopy"
#bind C-c run "tmux save-buffer | reattach-to-user-namespace pbcopy"

## use pbpaste & pbcopy in tmux
# set -g default-command "reattach-to-user-namespace -l /usr/local/bin/bash"

# renumber windows automatically
set-option -g renumber-windows on

# keep cwd
bind c new-window -c "#{pane_current_path}"

# splitting panes
bind | split-window -h -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"

# navigating windows/panes
bind C-h select-pane -L
bind C-j select-pane -D
bind C-k select-pane -U
bind C-l select-pane -R

bind -r C-[ select-window -t :-
bind -r C-] select-window -t :+

# resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# join/break panes
## send pane to new window
bind b break-pane -t :

# get pane from window
bind g command-prompt -p "get pane from:" "join-pane -s ':%%'"
bind s command-prompt -p "send pane to:" "join-pane -t ':%%'"

# allow mouse
# setw -g mode-mouse on
# set -g mouse-select-pane on
# set -g mouse-resize-pane on
# set -g mouse-select-window on
set -g mouse on

#### TERMINAL / COLOURS
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-ghostty:Tc,xterm-256color:Tc"

#### Claude Code ####
 set -g allow-passthrough on

#### POWERLINE STATUS BAR ####

# status bar position & refresh
set -g status-position bottom
set -g status-interval 5
set -g status-justify left

# activity monitoring (subtle — no bell)
setw -g monitor-activity on
set -g visual-activity off

# status bar colours
set -g status-style "bg=colour234,fg=colour255"

# left: session name in blue powerline segment
set -g status-left-length 50
set -g status-left "#{?client_prefix,#[fg=colour255 bg=colour196 bold] C-a #[fg=colour196 bg=colour39 nobold],}#[fg=colour232,bg=colour39,bold]  #S #[fg=colour39,bg=colour240,nobold]#[fg=colour255,bg=colour240] #(whoami) #[fg=colour240,bg=colour234]"

# right: date & time in powerline segments
set -g status-right-length 60
set -g status-right "#[fg=colour240,bg=colour234]#[fg=colour255,bg=colour240] %a %d %b #[fg=colour39,bg=colour240]#[fg=colour232,bg=colour39,bold] %H:%M "

# window tabs
# inactive window
set -g window-status-format "#[fg=colour234,bg=colour237]#[fg=colour244,bg=colour237] #I  #W #[fg=colour237,bg=colour234]"

# active window
set -g window-status-current-format "#[fg=colour234,bg=colour148]#[fg=colour232,bg=colour148,bold] #I  #W#{?window_zoomed_flag, ,} #[fg=colour148,bg=colour234]"

# window separator
set -g window-status-separator ""

# activity window style (subtle highlight)
set -g window-status-activity-style "fg=colour214,bg=colour237"

#### PANE BORDERS
set -g pane-border-style "fg=colour237"
set -g pane-active-border-style "fg=colour39"

#### MESSAGES & COMMAND PROMPT
set -g message-style "fg=colour232,bg=colour39,bold"
set -g message-command-style "fg=colour255,bg=colour237"

#### PANE NUMBER DISPLAY
set -g display-panes-active-colour colour39
set -g display-panes-colour colour237

#### CLOCK
setw -g clock-mode-colour colour39
